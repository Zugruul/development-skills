  component: plugins/spec-workflow/scripts/gate.sh
  severity: medium
  summary: Gate-pass recording is invalidated by a commit that changes no file contents,
    forcing a redundant full gate re-run
  detail: The recorded tree hash changed when the already-gated working-tree changes
    were committed, so the In-review move hook demanded a second ~10-minute gate run
